name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        shell: pwsh
        run: msbuild ConnectorTool\ConnectorTool.csproj /t:Restore,Build /p:Configuration=Release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ConnectorTool.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConnectorTool-Setup
          path: artifacts\ConnectorTool-Setup-*.exe

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem artifacts\ConnectorTool-Setup-*.exe | Select-Object -First 1
          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $installer.FullName --clobber
          } else {
            gh release create $env:RELEASE_TAG $installer.FullName --title "ConnectorTool $env:APP_VERSION" --notes "Windows 安装包，下载 ConnectorTool-Setup-$env:APP_VERSION.exe 后双击安装。"
          }
